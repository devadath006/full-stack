<!DOCTYPE html>
<html>
    <head>
        <title>Quiz system 1</title>
    </head>
    <body>
        <h1>Quiz System 1</h1>
        
        <h2 id="question"></h2>
        <div id="options"></div>
        <button id="nextBtn" onclick="nextQuestion()">Next Question</button>
        <script>
            let questions=[{
                question : "What is 2 + 3?",
                options : ["3","4","5","6"],
                answer : "5"
            },
            {
                question : "What is the capital of France?",
                options : ["Berlin","Madrid","Paris","Rome"],
                answer : "Paris"
            },
            {
                question : "Which planet is known as the Red Planet?",
                options : ["Earth","Mars","Jupiter","Saturn"],
                answer : "Mars"
            }
            ];
            let currentIndex=0;
            function showQuestion(){
                
            document.getElementById("question").innerHTML=questions[currentIndex].question;
            let optionsHtml="";
            for(let i=0;i<questions[currentIndex].options.length;i++){
                optionsHtml+=`<button onclick="checkAnswer('${questions[currentIndex].options[i]}')">${questions[currentIndex].options[i]}</button><br>`;
            }
            document.getElementById("options").innerHTML=optionsHtml;

        }
         function nextQuestion(){
            
             if(currentIndex<questions.length-1){
                 currentIndex++;

                showQuestion();
             }
             else{
                document.getElementById("question").innerHTML="Quiz finished";
                document.getElementById("nextBtn").disabled=true;
             }
            }
            showQuestion();
            function checkAnswer(selectedOption){
    let correctAnswer = questions[currentIndex].answer;

    if(selectedOption === correctAnswer){
        alert("Correct Answer ✅");
    }
    else{
        alert("Wrong Answer ❌");
    }
}
                                   
        </script>

    </body>

</html>
