<!DOCTYPE html>
<html>
    <head>
        <title>Professional Form Validation</title>
    </head>
    <body>
        <h1 style="color:red">Registration Form</h1>
        <form onsubmit="return validateForm()">
            <label>Name:</label>
            <input type="text" id="name"><br><br>
            <span id="nameError" style="color: red;"></span><br><br>

            <label>Email:</label>
            <input type="email" id="email"><br><br>
             <span id="emailError" style="color: red;"></span><br><br>

            <label>Password:</label>
            <input type="password" id="password"><br><br>
             <span id="passwordError" style="color: red;"></span><br><br>

            <label>Confirm Password:</label>
            <input type="password" id="confirmPassword"><br><br>
             <span id="confirmPasswordError" style="color: red;"></span><br><br>

            <input type="submit" value="Register">

            
        </form>
        <script src="form.js"></script>
    </body>
</html>
