<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rollover Menu Example</title>
<style>
body {
font-family: Arial, sans-serif;
margin: 0;
padding: 0;
background: #f4f4f9;
}

header {
background: #0073e6;
color: white;
text-align: center;
padding: 20px;
border-radius: 0 0 8px 8px;
}

nav {
background: #005bb5;
display: flex;
justify-content: center;
padding: 10px;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
}

nav a {
color: white;
text-decoration: none;
padding: 10px 20px;
margin: 0 10px;
font-size: 1rem;
transition: all 0.3s ease;
}

nav a:hover {
background: #003366;
}

/* Submenu styles */
.submenu {
position: absolute;
display: none;
background: #003366;
padding: 10px 0;
list-style: none;
margin-top: 10px;
border-radius: 4px;
box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
}

.submenu li {
padding: 8px 20px;
white-space: nowrap;
}

.submenu li a {
color: white;
text-decoration: none;
}

.submenu li a:hover {
text-decoration: underline;
}

/* Positioning container for relative elements */
.menu-item {
position: relative;
}
</style>
</head>
<body>
<header>
<h1>Rollover Menu Example</h1>
</header>

<nav>
<div class="menu-item">
<a href="#">Home</a>

</div>
<div class="menu-item">
<a href="#">About</a>

<ul class="submenu">
<li><a href="#">Our Team</a></li>

<li><a href="#">History</a></li>

<li><a href="#">Mission</a></li>

</ul>
</div>
<div class="menu-item">
<a href="#">Services</a>

<ul class="submenu">
<li><a href="#">Consulting</a></li>

<li><a href="#">Development</a></li>

<li><a href="#">Support</a></li>

</ul>
</div>
<div class="menu-item">
<a href="#">Contact</a>

</div>
</nav>

<script>
// JavaScript to show/hide submenus on hover
document.querySelectorAll('.menu-item').forEach(menuItem => {
// Show submenu on hover
menuItem.addEventListener('mouseenter', () => {
const submenu = menuItem.querySelector('.submenu');
if (submenu) {
submenu.style.display = 'block';
}
});

// Hide submenu when not hovered
menuItem.addEventListener('mouseleave', () => {
const submenu = menuItem.querySelector('.submenu');
if (submenu) {
submenu.style.display = 'none';
}
});
});
</script>
</body>
</html>
