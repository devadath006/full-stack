<!DOCTYPE html>
<html>
<head>
<style>
ul { list-style: none; margin:0; padding:0; background:#333; }
li { float:left; position:relative; }
li a { display:block; padding:14px 20px; color:white; text-decoration:none; }
.dropdown { display:none; position:absolute; top:48px; background:#f1f1f1; }
li:hover .dropdown { display:block; }
</style>
</head>
<body>

<ul>
  <li><a href="#">Home</a></li>
  <li>
    <a href="#">Services</a>
    <div class="dropdown">
      <a href="#">Web</a>
      <a href="#">App</a>
    </div>
  </li>
</ul>

</body>
</html>
